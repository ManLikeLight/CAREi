kind = "web"
previewPath = "/"
title = "CAREi"
version = "1.0.0"
id = "artifacts/carei-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 18548
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/carei-app run dev"

[services.env]
PORT = "18548"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/carei-app", "run", "build"]
publicDir = "artifacts/carei-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
